# Home Assistant / ESPHome-ready first test for the EE03 + IT8951.
# Put the `it8951` folder next to this YAML in your ESPHome config directory.
# This file is safe to publish. Create a local `secrets.yaml` from
# `secrets.example.yaml` before compiling.

esphome:
  name: xiao-epaper
  friendly_name: xiao-epaper
  on_boot:
    priority: -10
    then:
      - delay: 8s
      - component.update: epaper_display

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: arduino

psram:
  mode: octal

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Xiao-Epaper Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal:

external_components:
  - source:
      type: local
      path: .
    components: [it8951]

button:
  - platform: template
    name: "Refresh Display"
    on_press:
      then:
        - component.update: epaper_display

display:
  - platform: it8951
    id: epaper_display
    vcom: 1400
    update_interval: never
    lambda: |-
      const auto COLOR_WHITE = Color(0, 0, 0);
      const auto COLOR_BLACK = Color(255, 255, 255);

      it.fill(COLOR_WHITE);
      it.rectangle(20, 20, 1832, 1364, COLOR_BLACK);
      it.rectangle(60, 60, 1752, 1284, COLOR_BLACK);

      it.filled_rectangle(100, 100, 260, 260, COLOR_BLACK);
      it.rectangle(420, 100, 260, 260, COLOR_BLACK);
      it.rectangle(740, 100, 260, 260, COLOR_BLACK);
      it.filled_rectangle(1060, 100, 260, 260, COLOR_BLACK);

      it.line(120, 480, 1750, 480, COLOR_BLACK);
      it.line(120, 700, 1750, 700, COLOR_BLACK);
      it.line(120, 920, 1750, 920, COLOR_BLACK);

      it.line(120, 1160, 1750, 520, COLOR_BLACK);
      it.line(1750, 1160, 120, 520, COLOR_BLACK);

      it.circle(936, 702, 220, COLOR_BLACK);
      it.circle(936, 702, 140, COLOR_BLACK);
      it.filled_circle(936, 702, 50, COLOR_BLACK);
