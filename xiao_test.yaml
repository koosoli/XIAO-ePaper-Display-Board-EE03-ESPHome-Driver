# ============================================================================
# ESPHome YAML - Generated by ESPHome Designer
# Adapted for XIAO ePaper Display Board EE03 + IT8951 driver
# This file is safe to publish. Create a local `secrets.yaml` from
# `secrets.example.yaml` before compiling.
# ============================================================================

esphome:
  name: xiao-epaper
  friendly_name: xiao-epaper
  on_boot:
    priority: 300
    then:
      - delay: 2s
      - script.execute: manage_run_and_sleep

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: arduino

psram:
  mode: octal

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Xiao-Epaper Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal:

external_components:
  - source:
      type: local
      path: .
    components: [ it8951 ]

globals:
  - id: display_page
    type: int
    restore_value: true
    initial_value: '0'
  - id: page_refresh_default_s
    type: int
    restore_value: true
    initial_value: '600'
  - id: page_refresh_current_s
    type: int
    restore_value: false
    initial_value: '60'
  - id: last_page_switch_time
    type: uint32_t
    restore_value: false
    initial_value: '0'

http_request:
  verify_ssl: false
  timeout: 20s

time:
  - platform: homeassistant
    id: ha_time

button:
  - platform: template
    name: "Next Page"
    on_press:
      then:
        - script.execute:
            id: change_page_to
            target_page: !lambda 'return id(display_page) + 1;'
  - platform: template
    name: "Previous Page"
    on_press:
      then:
        - script.execute:
            id: change_page_to
            target_page: !lambda 'return id(display_page) - 1;'
  - platform: template
    name: "Refresh Display"
    on_press:
      then:
        - component.update: epaper_display
  - platform: template
    name: "Go to Page 1"
    on_press:
      then:
        - script.execute:
            id: change_page_to
            target_page: 0
  - platform: template
    name: "Go to Page 2"
    on_press:
      then:
        - script.execute:
            id: change_page_to
            target_page: 1

font:
  - file:
      type: gfonts
      family: "Roboto"
      weight: 900
      italic: false
    id: font_roboto_900_54
    size: 54
    glyphsets: [GF_Latin_Kernel]
    ignore_missing_glyphs: true
  - file:
      type: gfonts
      family: "Roboto"
      weight: 400
      italic: false
    id: font_roboto_400_20
    size: 20
    glyphsets: [GF_Latin_Kernel]
    ignore_missing_glyphs: true
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_material_design_icons_400_1242
    size: 1242
    glyphs: ["\U000F07D0"]
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_material_design_icons_400_126
    size: 126
    glyphs: ["\U000F02D1"]

script:
  - id: change_page_to
    parameters:
      target_page: int
    then:
      - lambda: |-
          int pages_count = 2;
          int target = target_page;
          while (target < 0) target += pages_count;
          target %= pages_count;

          uint32_t now = millis();
          if (now - id(last_page_switch_time) < 3000) {
            ESP_LOGD("display", "Page change ignored (debounce), last switch was %d ms ago", now - id(last_page_switch_time));
            return;
          }

          if (id(display_page) != target) {
            id(last_page_switch_time) = now;
            id(display_page) = target;
            id(epaper_display).update();
            ESP_LOGI("display", "Switched to page %d", target);
          }

  - id: manage_run_and_sleep
    mode: restart
    then:
      - logger.log: "Waiting for sync..."
      - wait_until:
          condition:
            lambda: 'return id(ha_time).now().is_valid() && api_is_connected();'
          timeout: 120s
      - delay: 5s
      - lambda: |-
          int p = id(display_page);
          int interval = id(page_refresh_default_s);
          id(page_refresh_current_s) = interval;
      - component.update: epaper_display
      - delay: !lambda 'return id(page_refresh_current_s) * 1000;'
      - script.execute: manage_run_and_sleep

display:
  - platform: it8951
    id: epaper_display
    vcom: 1400
    update_interval: never
    lambda: |-
      const auto COLOR_WHITE = Color(0, 0, 0);
      const auto COLOR_BLACK = Color(255, 255, 255);
      auto color_off = COLOR_WHITE;
      auto color_on = COLOR_BLACK;

      auto print_wrapped_text = [&](int x, int y, int max_w, int line_h, esphome::font::Font *font, Color color, TextAlign align, const char* text) {
        if (!text || max_w <= 0) return;
        int cx = x;
        int cy = y;
        std::string line;
        std::string word;
        const char* p = text;
        while (*p) {
          bool is_space = (*p == ' ' || *p == '\n' || *p == '\r' || *p == '\t');
          if (is_space) {
            if (!word.empty()) {
              int ww, wh, wbl, wx;
              font->measure(word.c_str(), &ww, &wx, &wbl, &wh);
              int lw = 0, lx;
              if (!line.empty()) { font->measure(line.c_str(), &lw, &lx, &wbl, &wh); int sw, sx, sbl, sh; font->measure(" ", &sw, &sx, &sbl, &sh); lw += sw; }
              if (lw + ww > max_w && !line.empty()) {
                it.print(cx, cy, font, color, align, line.c_str());
                cy += line_h;
                line = word;
              } else {
                if (!line.empty()) line += " ";
                line += word;
              }
              word.clear();
            }
          } else {
            word += *p;
          }
          p++;
        }
        if (!word.empty()) {
          int ww, wh, wbl, wx;
          font->measure(word.c_str(), &ww, &wx, &wbl, &wh);
          int lw = 0, lx;
          if (!line.empty()) { font->measure(line.c_str(), &lw, &lx, &wbl, &wh); int sw, sx, sbl, sh; font->measure(" ", &sw, &sx, &sbl, &sh); lw += sw; }
          if (lw + ww > max_w && !line.empty()) {
            it.print(cx, cy, font, color, align, line.c_str());
            cy += line_h;
            line = word;
          } else {
            if (!line.empty()) line += " ";
            line += word;
          }
        }
        if (!line.empty()) {
          it.print(cx, cy, font, color, align, line.c_str());
        }
      };

      int currentPage = id(display_page);

      // ▸ PAGE: Overview
      if (currentPage == 0) {
        it.fill(COLOR_WHITE);
        color_off = COLOR_WHITE;
        color_on = COLOR_BLACK;
        it.printf(971, 702, id(font_material_design_icons_400_1242), color_on, TextAlign::CENTER, "%s", "\U000F07D0");
        {
          auto draw_rrect_border = [&](int x, int y, int w, int h, int r, int t, auto c) {
            it.filled_rectangle(x + r, y, w - 2 * r, t, c);
            it.filled_rectangle(x + r, y + h - t, w - 2 * r, t, c);
            it.filled_rectangle(x, y + r, t, h - 2 * r, c);
            it.filled_rectangle(x + w - t, y + r, t, h - 2 * r, c);
            for (int dx = 0; dx <= r; dx++) {
              for (int dy = 0; dy <= r; dy++) {
                int ds = dx*dx + dy*dy;
                if (ds <= r*r && ds > (r-t)*(r-t)) {
                  it.draw_pixel_at(x + r - dx, y + r - dy, c);
                  it.draw_pixel_at(x + w - r + dx - 1, y + r - dy, c);
                  it.draw_pixel_at(x + r - dx, y + h - r + dy - 1, c);
                  it.draw_pixel_at(x + w - r + dx - 1, y + h - r + dy - 1, c);
                }
              }
            }
          };
          draw_rrect_border(629, 613, 701, 478, 43, 34, color_on);
        }
        {
          auto draw_filled_rrect = [&](int x, int y, int w, int h, int r, auto c) {
            it.filled_rectangle(x + r, y, w - 2 * r, h, c);
            it.filled_rectangle(x, y + r, r, h - 2 * r, c);
            it.filled_rectangle(x + w - r, y + r, r, h - 2 * r, c);
            it.filled_circle(x + r, y + r, r, c);
            it.filled_circle(x + w - r - 1, y + r, r, c);
            it.filled_circle(x + r, y + h - r - 1, r, c);
            it.filled_circle(x + w - r - 1, y + h - r - 1, r, c);
          };
          draw_filled_rrect(611, 598, 696, 480, 43, COLOR_BLACK);
          draw_filled_rrect(645, 632, 628, 412, 9, COLOR_WHITE);
        }
        it.printf(716, 673, id(font_roboto_900_54), color_on, TextAlign::TOP_LEFT, "ESPHome Designer");
        it.printf(971, 818, id(font_material_design_icons_400_126), color_on, TextAlign::CENTER, "%s", "\U000F02D1");
        it.printf(725, 919, id(font_roboto_900_54), color_on, TextAlign::TOP_LEFT, "Reterminal E1003");
      }

      // ▸ PAGE: Page 1
      if (currentPage == 1) {
        it.fill(COLOR_WHITE);
        color_off = COLOR_WHITE;
        color_on = COLOR_BLACK;
        it.printf(887, 682, id(font_roboto_400_20), color_on, TextAlign::TOP_LEFT, "Page 2");
      }
